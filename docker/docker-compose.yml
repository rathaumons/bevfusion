services:
  bev-train:
    container_name: bev-train
    build:
      context: .
      dockerfile: Dockerfile
    image: bev-train:latest
    working_dir: /workspace
    volumes:
      - /home/${USER}/docker/bev_train:/workspace
    stdin_open: true
    tty: true
    command: bash
    # GPU support (Compose v2 with NVIDIA Container Toolkit)
    gpus: all
    # Shared memory
    shm_size: "32gb"
